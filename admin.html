<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>产品库管理后台</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a1628;--card:#111d32;--border:#1e3a5f;
  --accent:#22c55e;--accent-hover:#16a34a;
  --text:#e2e8f0;--text-dim:#64748b;
  --warn:#f59e0b;--danger:#ef4444;--info:#3b82f6;
}
body{font-family:"Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* ===== Password Gate ===== */
.pw-gate{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#0a1628,#162416)}
.pw-box{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:32px 28px;width:360px;text-align:center}
.pw-box h2{font-size:20px;margin-bottom:8px;color:#fff}
.pw-box p{font-size:13px;color:var(--text-dim);margin-bottom:20px}
.pw-input{width:100%;padding:12px 14px;border:1px solid var(--border);border-radius:10px;background:var(--bg);color:var(--text);font-size:15px;outline:none;margin-bottom:14px;text-align:center;letter-spacing:4px}
.pw-input:focus{border-color:var(--accent)}
.pw-btn{width:100%;padding:12px;border-radius:10px;border:none;background:var(--accent);color:#fff;font-size:15px;font-weight:600;cursor:pointer}
.pw-btn:hover{background:var(--accent-hover)}
.pw-error{color:var(--danger);font-size:13px;margin-top:10px;display:none}

/* ===== Header ===== */
.header{background:linear-gradient(135deg,#0a1628,#162416);padding:16px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.header h1{font-size:18px;display:flex;align-items:center;gap:8px;white-space:nowrap}
.header h1 .icon{font-size:22px}
.header-right{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.dirty-dot{width:8px;height:8px;border-radius:50%;background:var(--warn);display:none;animation:pulse 1.5s infinite}
.dirty-dot.show{display:inline-block}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* ===== Buttons ===== */
.btn{padding:8px 16px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text);font-size:13px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:all .2s;font-family:inherit}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-primary:hover{background:var(--accent-hover);border-color:var(--accent-hover)}
.btn-publish{background:linear-gradient(135deg,#22c55e,#15803d);color:#fff;border:none;font-weight:700}
.btn-publish:hover{opacity:.9}
.btn-danger{background:var(--danger);color:#fff;border-color:var(--danger)}
.btn-danger:hover{background:#dc2626}
.btn-sm{padding:5px 10px;font-size:12px}

/* ===== Stats ===== */
.stats{display:flex;gap:12px;flex-wrap:wrap;padding:16px 24px;border-bottom:1px solid var(--border)}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 16px;flex:1;min-width:120px}
.stat-card .num{font-size:22px;font-weight:bold;color:var(--accent)}
.stat-card .label{font-size:11px;color:var(--text-dim);margin-top:2px}

/* ===== Toolbar ===== */
.toolbar{display:flex;gap:10px;padding:14px 24px;align-items:center;flex-wrap:wrap;border-bottom:1px solid var(--border)}
.search-wrap{position:relative;flex:1;min-width:200px}
.search-wrap input{width:100%;padding:8px 36px 8px 12px;border:1px solid var(--border);border-radius:8px;background:var(--card);color:var(--text);font-size:13px;outline:none}
.search-wrap input:focus{border-color:var(--accent)}
.search-wrap .s-icon{position:absolute;right:10px;top:50%;transform:translateY(-50%);color:var(--text-dim)}

/* ===== Table ===== */
.table-wrap{padding:0 24px}
.table-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;min-width:1000px}
th{background:#0e1a2e;padding:10px 12px;text-align:left;font-size:12px;font-weight:600;color:var(--text-dim);white-space:nowrap;border-bottom:1px solid var(--border);position:sticky;top:0}
td{padding:8px 12px;border-bottom:1px solid var(--border);vertical-align:middle;font-size:13px}
tr:hover td{background:rgba(34,197,94,.03)}

/* Image cell */
.img-cell{width:72px;position:relative;cursor:pointer}
.img-wrap{width:56px;height:56px;border-radius:8px;overflow:hidden;background:linear-gradient(135deg,#1e3320,#2d4a2d);display:flex;align-items:center;justify-content:center;position:relative}
.img-wrap img{width:100%;height:100%;object-fit:cover;border-radius:8px}
.img-wrap .replace-hint{position:absolute;inset:0;background:rgba(0,0,0,.65);color:#fff;font-size:10px;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s;border-radius:8px}
.img-cell:hover .replace-hint{opacity:1}
.img-wrap .placeholder-icon{font-size:24px;opacity:.35}
.img-cell input[type=file]{display:none}

/* Category badge */
.cat-badge{display:inline-block;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600;white-space:nowrap;cursor:pointer}
.cat-badge.grain{background:rgba(34,197,94,.15);color:#4ade80}
.cat-badge.sauce{background:rgba(245,158,11,.15);color:#fbbf24}
.cat-badge.noodle{background:rgba(168,85,247,.15);color:#c084fc}
.cat-badge.egg{background:rgba(251,146,60,.15);color:#fb923c}
.cat-badge.oil{background:rgba(34,197,94,.15);color:#4ade80}
.cat-badge.tea{background:rgba(20,184,166,.15);color:#2dd4bf}
.cat-badge.supplement{background:rgba(139,92,246,.15);color:#a78bfa}
.cat-badge.seafood{background:rgba(59,130,246,.15);color:#60a5fa}
.cat-badge.nut{background:rgba(239,68,68,.15);color:#f87171}
.cat-badge.mushroom{background:rgba(132,204,22,.15);color:#84cc16}
.cat-badge.other{background:rgba(148,163,184,.15);color:#94a3b8}

/* Price */
.price-cell{font-weight:700;color:var(--accent);white-space:nowrap}

/* URL inputs */
.url-input{width:100%;padding:6px 8px;border:1px solid var(--border);border-radius:6px;background:var(--bg);color:var(--text);font-size:12px;outline:none;font-family:"Consolas","Monaco",monospace;min-width:140px}
.url-input:focus{border-color:var(--accent)}

/* Action buttons */
.action-cell{display:flex;gap:4px;justify-content:center;white-space:nowrap}

/* ===== Modal ===== */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:1000;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.active{display:flex}
.modal-box{background:var(--card);border:1px solid var(--border);border-radius:16px;width:100%;max-width:600px;max-height:85vh;overflow-y:auto;padding:24px}
.modal-box h2{font-size:18px;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.modal-box h2 .close-btn{margin-left:auto;cursor:pointer;color:var(--text-dim);font-size:24px;background:none;border:none;line-height:1}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:13px;color:var(--text-dim);margin-bottom:6px;font-weight:600}
.form-group input[type=text],.form-group textarea{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text);font-size:14px;outline:none;font-family:inherit}
.form-group input:focus,.form-group textarea:focus{border-color:var(--accent)}
.form-group textarea{min-height:60px;resize:vertical}
.form-group .hint{font-size:11px;color:var(--text-dim);margin-top:4px}
.highlights-list{display:flex;flex-direction:column;gap:6px}
.highlight-item{display:flex;gap:6px;align-items:center}
.highlight-item input{flex:1}
.hl-remove{cursor:pointer;color:var(--danger);background:none;border:none;font-size:18px;line-height:1;padding:0 2px}
.hl-add{font-size:13px;color:var(--accent);cursor:pointer;background:none;border:none;padding:4px 0}
/* Image upload in modal */
.img-upload-area{display:flex;align-items:center;gap:16px}
.img-preview-box{width:80px;height:80px;border-radius:10px;overflow:hidden;background:linear-gradient(135deg,#1e3320,#2d4a2d);display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;position:relative}
.img-preview-box img{width:100%;height:100%;object-fit:cover}
.img-preview-box .ph{font-size:32px;opacity:.35}
.img-preview-box .replace-overlay{position:absolute;inset:0;background:rgba(0,0,0,.65);color:#fff;font-size:11px;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s}
.img-preview-box:hover .replace-overlay{opacity:1}
.img-upload-area input[type=file]{display:none}
.img-upload-area .or-text{color:var(--text-dim);font-size:12px}
/* Category datalist input */
.cat-input-wrap{position:relative}
.cat-input-wrap input{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text);font-size:14px;outline:none}
.cat-input-wrap input:focus{border-color:var(--accent)}

/* ===== Footer ===== */
.footer-bar{padding:20px 24px;border-top:1px solid var(--border);display:flex;flex-wrap:wrap;gap:12px;align-items:center;justify-content:space-between}
.footer-bar .tips{font-size:12px;color:var(--text-dim);max-width:600px}
.footer-bar .tips strong{color:var(--accent)}

/* ===== Toast ===== */
.toast{position:fixed;top:20px;right:20px;padding:12px 20px;border-radius:10px;font-size:14px;font-weight:600;z-index:9999;animation:slideIn .3s ease;max-width:400px;box-shadow:0 8px 24px rgba(0,0,0,.3)}
.toast-success{background:var(--accent);color:#fff}
.toast-error{background:var(--danger);color:#fff}
.toast-info{background:var(--info);color:#fff}
@keyframes slideIn{from{transform:translateX(60px);opacity:0}to{transform:translateX(0);opacity:1}}

/* ===== Publish Progress ===== */
.publish-progress{margin-top:16px;padding:16px;background:var(--bg);border-radius:10px;border:1px solid var(--border)}
.publish-step{display:flex;align-items:center;gap:8px;padding:6px 0;font-size:13px;color:var(--text-dim)}
.publish-step.done{color:var(--accent)}
.publish-step.active{color:var(--warn)}
.publish-step .step-icon{width:20px;text-align:center}

@media(max-width:768px){
  .header{padding:12px 16px}
  .stats{padding:12px 16px}
  .toolbar{padding:10px 16px}
  .table-wrap{padding:0 8px}
  th,td{padding:6px 8px;font-size:12px}
  .modal-box{padding:16px}
  .footer-bar{padding:16px}
}
</style>
</head>
<body>
<script src="data/products.js"></script>

<!-- ===== Password Gate ===== -->
<div class="pw-gate" id="pwGate">
  <div class="pw-box">
    <div style="font-size:40px;margin-bottom:12px">🔐</div>
    <h2 id="pwTitle">设置管理密码</h2>
    <p id="pwDesc">首次使用请设置管理密码，保护后台安全</p>
    <input type="password" class="pw-input" id="pwInput" placeholder="输入密码" maxlength="20" autofocus>
    <input type="password" class="pw-input" id="pwInput2" placeholder="确认密码" maxlength="20" style="display:none">
    <button class="pw-btn" id="pwBtn" onclick="handlePassword()">确认</button>
    <div class="pw-error" id="pwError"></div>
  </div>
</div>

<!-- ===== Main App ===== -->
<div id="app" style="display:none">
  <!-- Header -->
  <div class="header">
    <h1><span class="icon">⚙️</span> 产品库管理后台</h1>
    <div class="header-right">
      <span class="dirty-dot" id="dirtyDot" title="有未发布的修改"></span>
      <span style="font-size:12px;color:var(--text-dim)" id="statusText">已加载 <strong id="productCount">0</strong> 个产品</span>
      <button class="btn btn-sm" onclick="openSettings()">⚙️ 设置</button>
      <button class="btn btn-sm btn-publish" onclick="confirmPublish()">🚀 发布更新</button>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats" id="statsBar"></div>

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="search-wrap">
      <input type="text" id="searchInput" placeholder="搜索产品名称 / 类目...">
      <span class="s-icon">🔍</span>
    </div>
    <button class="btn btn-primary btn-sm" onclick="openAddProduct()">＋ 添加产品</button>
    <button class="btn btn-sm" onclick="openBatchImport()">📥 批量导入</button>
    <button class="btn btn-sm" onclick="exportJSON()">📤 导出数据</button>
  </div>

  <!-- Table -->
  <div class="table-wrap">
    <div class="table-scroll">
      <table>
        <thead>
          <tr>
            <th style="width:72px">图片</th>
            <th style="width:100px">类目</th>
            <th style="min-width:160px">产品名称</th>
            <th style="width:80px">价格</th>
            <th style="min-width:180px">商城链接</th>
            <th style="min-width:180px">视频链接</th>
            <th style="width:100px">操作</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer-bar">
    <div class="tips">
      <strong>💡 操作提示：</strong>点击图片可更换 · 点击类目可修改 · 编辑后点「发布更新」自动上线 · 设置中配置GitHub Token
    </div>
  </div>
</div>

<!-- ===== Edit/Add Modal ===== -->
<div class="modal-overlay" id="editModal">
  <div class="modal-box">
    <h2><span id="editModalIcon">✏️</span> <span id="editModalTitle">编辑产品</span> <button class="close-btn" onclick="closeEditModal()">&times;</button></h2>
    <div id="editForm"></div>
    <div style="margin-top:20px;display:flex;gap:10px;justify-content:flex-end">
      <button class="btn" onclick="closeEditModal()">取消</button>
      <button class="btn btn-primary" onclick="saveEdit()">保存</button>
    </div>
  </div>
</div>

<!-- ===== Batch Import Modal ===== -->
<div class="modal-overlay" id="batchModal">
  <div class="modal-box">
    <h2>📥 批量导入 <button class="close-btn" onclick="closeBatchModal()">&times;</button></h2>
    <div class="form-group">
      <label>粘贴JSON数据（数组格式）</label>
      <textarea id="batchInput" rows="10" placeholder='[{"category":"类目","name":"产品名","price":"¥XX","highlights":["卖点1"],"image":"","shopUrl":"","videoUrl":""}]'></textarea>
      <div class="hint">支持导入新产品，已有的产品（按name匹配）将更新信息</div>
    </div>
    <div style="display:flex;gap:10px;justify-content:flex-end">
      <button class="btn" onclick="closeBatchModal()">取消</button>
      <button class="btn btn-primary" onclick="doBatchImport()">导入</button>
    </div>
  </div>
</div>

<!-- ===== Settings Modal ===== -->
<div class="modal-overlay" id="settingsModal">
  <div class="modal-box">
    <h2>⚙️ 设置 <button class="close-btn" onclick="closeSettings()">&times;</button></h2>
    <div class="form-group">
      <label>GitHub Personal Access Token</label>
      <input type="password" id="settingToken" placeholder="ghp_xxxxxxxxxxxx">
      <div class="hint">需要 repo 权限。<a href="https://github.com/settings/tokens/new" target="_blank" style="color:var(--accent)">去创建Token</a> → 勾选 repo 权限 → 生成后粘贴到此处</div>
    </div>
    <div class="form-group">
      <label>仓库所有者</label>
      <input type="text" id="settingOwner" placeholder="sanshiyoudao">
    </div>
    <div class="form-group">
      <label>仓库名称</label>
      <input type="text" id="settingRepo" placeholder="organic-product-catalog">
    </div>
    <div class="form-group">
      <label>修改管理密码</label>
      <input type="password" id="settingNewPw" placeholder="留空则不修改">
    </div>
    <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:20px">
      <button class="btn" onclick="closeSettings()">取消</button>
      <button class="btn btn-primary" onclick="saveSettings()">保存设置</button>
    </div>
  </div>
</div>

<!-- ===== Publish Confirm Modal ===== -->
<div class="modal-overlay" id="publishModal">
  <div class="modal-box">
    <h2>🚀 发布更新 <button class="close-btn" onclick="closePublishModal()">&times;</button></h2>
    <div id="publishContent">
      <p style="margin-bottom:12px">将以下修改发布到线上：</p>
      <div id="publishSummary" style="background:var(--bg);border-radius:10px;padding:14px;margin-bottom:16px;font-size:13px"></div>
      <div id="publishProgress" style="display:none"></div>
    </div>
    <div id="publishActions" style="display:flex;gap:10px;justify-content:flex-end;margin-top:16px">
      <button class="btn" onclick="closePublishModal()">取消</button>
      <button class="btn btn-publish" id="publishBtn" onclick="doPublish()">确认发布</button>
    </div>
  </div>
</div>

<!-- ===== Category Edit Modal ===== -->
<div class="modal-overlay" id="catModal">
  <div class="modal-box" style="max-width:360px">
    <h2>📝 修改类目 <button class="close-btn" onclick="closeCatModal()">&times;</button></h2>
    <div class="form-group">
      <label>选择或输入新类目</label>
      <div class="cat-input-wrap">
        <input type="text" id="catInput" list="catList" placeholder="输入或选择类目">
        <datalist id="catList"></datalist>
      </div>
    </div>
    <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:16px">
      <button class="btn" onclick="closeCatModal()">取消</button>
      <button class="btn btn-primary" onclick="saveCatEdit()">确定</button>
    </div>
  </div>
</div>

<script>
// ========== State ==========
let allProducts = [];
let isDirty = false;
let editingIdx = -1; // -1 = adding new
let editingCatIdx = -1;

// ========== Category helpers ==========
const CAT_CLASS_MAP = {
  '有机粮油':'grain','有机调味':'sauce','面食米线':'noodle',
  '蛋禽肉奶':'egg','有机杂粮':'grain','有机食用油':'oil',
  '有机饮品':'tea','滋补养生':'supplement','海产品类':'seafood',
  '坚果干果':'nut','菌菇干货':'mushroom'
};
function getCatClass(cat) {
  return CAT_CLASS_MAP[cat] || 'other';
}
function getCatIcon(cat) {
  if(cat.includes('调味')||cat.includes('酱')||cat.includes('醋')) return '🫙';
  if(cat.includes('粮')||cat.includes('米')||(cat.includes('面')&&!cat.includes('条'))) return '🌾';
  if(cat.includes('蔬')||cat.includes('菜')) return '🥬';
  if(cat.includes('果')||cat.includes('坚果')) return '🍎';
  if(cat.includes('茶')||cat.includes('饮')||cat.includes('汁')) return '🍵';
  if(cat.includes('油')) return '🫒';
  if(cat.includes('肉')||cat.includes('禽')||cat.includes('蛋')) return '🥚';
  if(cat.includes('鱼')||cat.includes('虾')||cat.includes('水')||cat.includes('海')) return '🦐';
  if(cat.includes('奶')||cat.includes('乳')) return '🥛';
  if(cat.includes('补')||cat.includes('养')||cat.includes('参')||cat.includes('芪')||cat.includes('归')) return '🌿';
  if(cat.includes('面条')||cat.includes('挂面')||cat.includes('米线')) return '🍜';
  if(cat.includes('菌')||cat.includes('菇')||cat.includes('木耳')) return '🍄';
  return '🌱';
}
function getImageUrl(p) {
  if (p.image && p.image.length > 5) return p.image;
  return `images/${p.id}.jpg`;
}
function hasRealImage(p) {
  return p.image && p.image.length > 5;
}
function getExistingCategories() {
  return [...new Set(allProducts.map(p => p.category))].sort();
}

// ========== Password ==========
function handlePassword() {
  const hasPw = localStorage.getItem('admin_pw');
  const input = document.getElementById('pwInput').value.trim();
  const error = document.getElementById('pwError');

  if (!hasPw) {
    // First time: set password
    const input2 = document.getElementById('pwInput2').value.trim();
    if (!input) { error.textContent='请输入密码'; error.style.display='block'; return; }
    if (input.length < 4) { error.textContent='密码至少4位'; error.style.display='block'; return; }
    if (input !== input2) { error.textContent='两次密码不一致'; error.style.display='block'; return; }
    localStorage.setItem('admin_pw', btoa(input));
    unlockApp();
  } else {
    // Verify password
    if (btoa(input) === hasPw) {
      unlockApp();
    } else {
      error.textContent='密码错误'; error.style.display='block';
      document.getElementById('pwInput').value='';
    }
  }
}
function unlockApp() {
  document.getElementById('pwGate').style.display='none';
  document.getElementById('app').style.display='block';
  loadProducts();
}
function initPasswordGate() {
  const hasPw = localStorage.getItem('admin_pw');
  if (!hasPw) {
    document.getElementById('pwTitle').textContent='设置管理密码';
    document.getElementById('pwDesc').textContent='首次使用请设置管理密码，保护后台安全';
    document.getElementById('pwInput2').style.display='block';
    document.getElementById('pwBtn').textContent='设置密码';
  } else {
    document.getElementById('pwTitle').textContent='输入管理密码';
    document.getElementById('pwDesc').textContent='请输入密码进入管理后台';
    document.getElementById('pwInput2').style.display='none';
    document.getElementById('pwBtn').textContent='进入';
  }
}
document.getElementById('pwInput').addEventListener('keydown', e => { if(e.key==='Enter') handlePassword(); });

// ========== Load Data ==========
function loadProducts() {
  // Try localStorage draft first
  const draft = localStorage.getItem('admin_draft');
  if (draft) {
    try {
      allProducts = JSON.parse(draft);
      const useDraft = allProducts.length > 0;
      if (useDraft) {
        renderTable();
        updateStats();
        document.getElementById('productCount').textContent = allProducts.length;
        markDirty(true);
        showToast('♻️ 已恢复上次未发布的修改', 'info');
        return;
      }
    } catch(e) {}
  }

  // Load from products.js
  if (window.PRODUCT_DATA && window.PRODUCT_DATA.length > 0) {
    allProducts = JSON.parse(JSON.stringify(window.PRODUCT_DATA)); // deep clone
  } else {
    fetch('./data/products.json?t='+Date.now())
      .then(r => r.json())
      .then(data => { allProducts = data; renderTable(); updateStats(); })
      .catch(() => showToast('数据加载失败', 'error'));
  }
  renderTable();
  updateStats();
  document.getElementById('productCount').textContent = allProducts.length;
}

// ========== Image Upload ==========
function triggerImgUpload(idx) {

async function handleImgUpload(idx, event) {
  const file = event.target.files[0];
  if (!file) return;
  if (!file.type.startsWith('image/')) { showToast('请选择图片文件','error'); return; }
  if (file.size > 5*1024*1024) { showToast('图片不能超过5MB','error'); return; }

  showToast('📷 图片上传中...','info');
  try {
    const compressed = await compressImage(file, 800, 0.85);
    const formData = new FormData();
    formData.append('image', compressed.split(',')[1]);
    const res = await fetch('https://api.imgbb.com/1/upload?key=a8d7cb8d78c739adac8dbd5bd8edab07', {
      method:'POST', body:formData
    });
    if (res.ok) {
      const result = await res.json();
      if (result.success && result.data?.url) {
        allProducts[idx].image = result.data.url;
        renderTable(document.getElementById('searchInput').value);
        markDirty(true);
        showToast(`✅ "${allProducts[idx].name}" 图片已更新！`,'success');
        return;
      }
    }
    throw new Error('图床服务暂不可用');
  } catch(err) {
    // Fallback: base64
    const reader = new FileReader();
    reader.onload = function(e) {
      allProducts[idx].image = e.target.result;
      renderTable(document.getElementById('searchInput').value);
      markDirty(true);
      showToast(`✅ "${allProducts[idx].name}" 图片已保存（本地模式）`,'success');
    };
    reader.readAsDataURL(file);
  } finally {
    event.target.value = '';
  }
}

function compressImage(file, maxWidth, quality) {
  return new Promise(resolve => {
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    const img = new Image();
    img.onload = () => {
      let w = img.width, h = img.height;
      if (w > maxWidth) { h = Math.round(h*maxWidth/w); w = maxWidth; }
      canvas.width = w; canvas.height = h;
      ctx.drawImage(img, 0, 0, w, h);
      resolve(canvas.toDataURL('image/jpeg', quality));
    };
    img.src = URL.createObjectURL(file);
  });
}

function openBatchImport() {

  document.getElementById('batchModal').classList.add('active');
}

function doBatchImport() {
  const text = document.getElementById('batchInput').value.trim();
  if (!text) { showToast('请粘贴数据','error'); return; }
  try {
    let items = JSON.parse(text);
    if (!Array.isArray(items)) { showToast('数据必须是数组格式','error'); return; }
    let added = 0, updated = 0;
    const maxId = Math.max(0, ...allProducts.map(p=>p.id));
    items.forEach((item, i) => {
      if (!item.name) return;
      const existing = allProducts.find(p => p.name === item.name);
      if (existing) {
        // Update existing
        if (item.category) existing.category = item.category;
        if (item.price) existing.price = item.price;
        if (item.image) existing.image = item.image;
        if (item.shopUrl) existing.shopUrl = item.shopUrl;
        if (item.videoUrl) existing.videoUrl = item.videoUrl;
        if (item.highlights) existing.highlights = item.highlights;
        updated++;
      } else {
        // Add new
        allProducts.push({
          id: item.id || (maxId + added + 1),
          category: item.category || '其他',
          name: item.name,
          price: item.price || '¥0',
          image: item.image || '',
          highlights: item.highlights || [],
          shopUrl: item.shopUrl || '',
          videoUrl: item.videoUrl || ''
        });
        added++;
      }
    });
    renderTable(document.getElementById('searchInput').value);
    updateStats();
    markDirty(true);
    closeBatchModal();
    showToast(`✅ 导入完成：新增${added}个，更新${updated}个`,'success');
  } catch(e) {
    showToast('JSON格式错误，请检查数据','error');
  }
}

async function doPublish() {
  const token = localStorage.getItem('gh_token');
  const owner = localStorage.getItem('gh_owner') || 'sanshiyoudao';
  const repo = localStorage.getItem('gh_repo') || 'organic-product-catalog';
  const path = 'data/products.js';

  const btn = document.getElementById('publishBtn');
  btn.disabled = true;
  btn.textContent = '发布中...';

  const progressEl = document.getElementById('publishProgress');
  progressEl.style.display = 'block';
  progressEl.innerHTML = '';

  function addStep(text, state='active') {
    progressEl.innerHTML += `<div class="publish-step ${state}"><span class="step-icon">${state==='done'?'✅':state==='active'?'⏳':'⬜'}</span>${text}</div>`;
  }

  try {
    // Step 1: Get current file SHA
    addStep('获取文件信息...', 'active');
    const getRes = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}`, {
      headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' }
    });
    if (!getRes.ok) {
      const err = await getRes.json();
      throw new Error(err.message || '获取文件失败，请检查Token权限');
    }
    const fileData = await getRes.json();
    const sha = fileData.sha;
    progressEl.lastChild.className = 'publish-step done';
    progressEl.lastChild.querySelector('.step-icon').textContent = '✅';

    // Step 2: Prepare content
    addStep('准备数据...', 'active');
    const content = `window.PRODUCT_DATA = ${JSON.stringify(allProducts, null, 2)};\n`;
    const encodedContent = btoa(unescape(encodeURIComponent(content)));
    progressEl.lastChild.className = 'publish-step done';
    progressEl.lastChild.querySelector('.step-icon').textContent = '✅';

    // Step 3: Commit
    addStep('提交到GitHub...', 'active');
    const putRes = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}`, {
      method: 'PUT',
      headers: {
        'Authorization': `token ${token}`,
        'Accept': 'application/vnd.github.v3+json',
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        message: `更新产品数据 - ${new Date().toLocaleString('zh-CN')}`,
        content: encodedContent,
        sha: sha
      })
    });
    if (!putRes.ok) {
      const err = await putRes.json();
      throw new Error(err.message || '提交失败');
    }
    progressEl.lastChild.className = 'publish-step done';
    progressEl.lastChild.querySelector('.step-icon').textContent = '✅';

    // Success!
    addStep('✅ 发布成功！1-2分钟后线上更新', 'done');
    markDirty(false);
    clearDraft();
    // Update the global PRODUCT_DATA
    window.PRODUCT_DATA = JSON.parse(JSON.stringify(allProducts));
    btn.textContent = '已发布 ✓';

  } catch(err) {
    addStep(`❌ 发布失败：${err.message}`, '');
    btn.disabled = false;
    btn.textContent = '重试发布';
  }
}

// ========== Toast ==========
function showToast(msg, type='info') {
  const existing = document.querySelector('.toast');
  if (existing) existing.remove();
  const el = document.createElement('div');
  el.className = `toast toast-${type}`;
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 4000);
}

// ========== Init ==========
initPasswordGate();

// Prevent accidental close with unsaved changes
window.addEventListener('beforeunload', e => {
  if (isDirty) {
    e.preventDefault();
    e.returnValue = '';
  }
});
</script>
