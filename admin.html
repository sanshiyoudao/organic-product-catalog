<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>产品库管理后台</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0f172a;--card:#1e293b;--border:#334155;
  --accent:#22c55e;--accent-hover:#16a34a;
  --text:#e2e8f0;--text-dim:#94a3b8;
  --warn:#f59e0b;--danger:#ef4444;
}
body{font-family:"Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}

.header{background:linear-gradient(135deg,#1e293b 0%,#0f172a 100%);padding:20px 24px;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.header h1{font-size:22px;color:#fff;display:flex;align-items:center;gap:10px}
.header h1 .icon{font-size:28px}
.header p{color:var(--text-dim);margin-top:6px;font-size:14px}

.toolbar{display:flex;flex-wrap:wrap;gap:12px;padding:16px 24px;background:var(--card);border-bottom:1px solid var(--border);align-items:center}
.search-wrap{flex:1;min-width:200px;position:relative}
.search-wrap input{width:100%;padding:10px 38px 10px 14px;border:1px solid var(--border);border-radius:10px;background:var(--bg);color:var(--text);font-size:14px;outline:none;transition:border .2s}
.search-wrap input:focus{border-color:var(--accent)}
.search-wrap .search-icon{position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--text-dim);pointer-events:none;font-size:16px}

.btn{padding:9px 18px;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:all .2s;font-family:inherit}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent-hover)}
.btn-secondary{background:var(--border);color:var(--text)}
.btn-secondary:hover{background:#475569}
.btn-warn{background:var(--warn);color:#000}
.btn-warn:hover{opacity:.9}
.btn-danger{background:var(--danger);color:#fff}
.btn-sm{padding:6px 12px;font-size:12px}

.main{max-width:1400px;margin:0 auto;padding:20px 24px}

/* Stats bar */
.stats{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:20px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 20px;flex:1;min-width:130px}
.stat-card .num{font-size:26px;font-weight:bold;color:var(--accent)}
.stat-card .label{font-size:12px;color:var(--text-dim);margin-top:2px}

/* Table */
.table-wrap{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden}
.table-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;min-width:900px}
th{background:#162032;padding:12px 14px;text-align:left;font-size:13px;font-weight:600;color:var(--text-dim);white-space:nowrap;border-bottom:1px solid var(--border);position:sticky;top:0}
td{padding:10px 14px;border-bottom:1px solid var(--border);vertical-align:middle;font-size:13px}
tr:hover td{background:rgba(34,197,94,.04)}

.col-img{width:80px;text-align:center}
.col-cat{width:100px}
.col-name{min-width:180px}
.col-price{width:90px}
.col-url{min-width:200px}
.col-action{width:120px;text-align:center}

/* Product image thumbnail */
.prod-img{width:56px;height:56px;border-radius:8px;object-fit:cover;background:linear-gradient(135deg,#1e3320,#2d4a2d);display:flex;align-items:center;justify-content:center;font-size:24px;color:var(--text-dim);overflow:hidden;position:relative;cursor:pointer}
.prod-img img{width:100%;height:100%;object-fit:cover;border-radius:8px}
.prod-img .upload-hint{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.65);color:#fff;font-size:10px;padding:2px 4px;text-align:center;opacity:0;transition:opacity .2s}
.prod-img:hover .upload-hint{opacity:1}

/* Category badge */
.cat-badge{display:inline-block;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600;white-space:nowrap}
.cat-badge.organic-grain{background:rgba(34,197,94,.15);color:#4ade80}
.cat-badge.organic-sauce{background:rgba(245,158,11,.15);color:#fbbf24}
.cat-badge.organic-noodle{background:rgba(168,85,247,.15);color:#c084fc}
.cat-badge.organic-egg{background:rgba(251,146,60,.15);color:#fb923c}
.cat-badge.organic-oil{background:rgba(34,197,94,.15);color:#4ade80}
.cat-badge.organic-tea{background:rgba(20,184,166,.15);color:#2dd4bf}
.cat-badge.organic-supplement{background:rgba(139,92,246,.15);color:#a78bfa}
.cat-badge.organic-seafood{background:rgba(59,130,246,.15);color:#60a5fa}
.cat-badge.organic-nut{background:rgba(239,68,68,.15);color:#f87171}
.cat-badge.organic-mushroom{background:rgba(132,204,22,.15);color:#84cc16}
.cat-badge.organic-other{background:rgba(148,163,184,.15);color:#94a3b8}

/* Inputs */
.input-text{width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text);font-size:13px;outline:none;transition:border .2s;font-family:inherit}
.input-text:focus{border-color:var(--accent)}
.input-text.url-input{font-family:"Consolas","Monaco",monospace;font-size:12px}
.price-cell{text-align:right;font-weight:700;color:var(--accent);white-space:nowrap}

/* Upload area */
.upload-btn{display:inline-flex;align-items:center;justify-content:center;width:56px;height:56px;border:2px dashed var(--border);border-radius:8px;cursor:pointer;transition:all .2s;background:transparent;color:var(--text-dim);font-size:22px;position:relative;overflow:hidden}
.upload-btn:hover{border-color:var(--accent);color:var(--accent)}
.upload-btn input{position:absolute;inset:0;opacity:0;cursor:pointer}
.upload-btn.uploading{pointer-events:none;border-style:solid;border-color:var(--warn);color:var(--warn)}
.upload-btn .spin{display:none;animation:spin .8s linear infinite}
.upload-btn.uploading .spin{display:block}
.upload-btn.uploading .plus-icon{display:none}
@keyframes spin{to{transform:rotate(360deg)}}

/* Action buttons */
.action-cell{display:flex;gap:4px;justify-content:center;flex-wrap:nowrap}

/* Toast */
.toast{position:fixed;top:20px;right:20px;padding:12px 20px;border-radius:12px;font-size:14px;font-weight:600;z-index:9999;animation:slideIn .3s ease;max-width:360px}
.toast-success{background:var(--accent);color:#fff}
.toast-error{background:var(--danger);color:#fff}
.toast-info{background:var(--warn);color:#000}
@keyframes slideIn{from{transform:translateX(60px);opacity:0}to{transform:translateX(0);opacity:1}}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:1000;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.active{display:flex}
.modal-box{background:var(--card);border:1px solid var(--border);border-radius:16px;width:100%;max-width:560px;max-height:85vh;overflow-y:auto;padding:24px}
.modal-box h2{font-size:18px;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.modal-box h2 .close-btn{margin-left:auto;cursor:pointer;color:var(--text-dim);font-size:24px;background:none;border:none;line-height:1}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:13px;color:var(--text-dim);margin-bottom:6px;font-weight:600}
.form-group textarea,.form-group input[type=text]{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:10px;background:var(--bg);color:var(--text);font-size:14px;outline:none;font-family:inherit;resize:vertical}
.form-group textarea:focus,.form-group input[type=text]:focus{border-color:var(--accent)}
.form-group textarea{min-height:60px}
.highlights-list{display:flex;flex-direction:column;gap:6px}
.highlight-item{display:flex;gap:6px;align-items:center}
.highlight-item input{flex:1}
.hl-remove{cursor:pointer;color:var(--danger);background:none;border:none;font-size:18px;line-height:1;padding:0 2px}
.hl-add{font-size:13px;color:var(--accent);cursor:pointer;background:none;border:none;padding:4px 0}

.footer-bar{margin-top:24px;padding:20px;border-top:1px solid var(--border);display:flex;flex-wrap:wrap;gap:12px;align-items:center;justify-content:space-between}
.footer-bar .tips{font-size:13px;color:var(--text-dim);max-width:500px}
.footer-bar .tips strong{color:var(--accent)}

@media(max-width:768px){
  .toolbar{padding:12px 16px}
  .main{padding:16px}
  th,td{padding:8px 10px;font-size:12px}
  .header h1{font-size:18px}
}

/* Image preview in modal */
.img-preview{max-width:100%;max-height:300px;border-radius:10px;margin-top:10px;display:none}
.img-preview.show{display:block}
</style>
</head>
<body>

<div class="header">
  <h1><span class="icon">⚙️</span> 产品库管理后台</h1>
  <p>在此页面管理所有产品数据 — 上传图片、填写链接、一键导出</p>
</div>

<div class="toolbar">
  <div class="search-wrap">
    <input type="text" id="searchInput" placeholder="搜索产品名称...">
    <span class="search-icon">🔍</span>
  </div>
  <button class="btn btn-primary" onclick="exportJSON()">📥 导出数据</button>
  <button class="btn btn-secondary" onclick="showStats()">📊 统计</button>
  <span style="font-size:13px;color:var(--text-dim)" id="statusText">已加载 <strong id="productCount">0</strong> 个产品</span>
</div>

<div class="main">
  <div class="stats" id="statsBar"></div>

  <div class="table-wrap">
    <div class="table-scroll">
      <table>
        <thead>
          <tr>
            <th class="col-img">图片</th>
            <th class="col-cat">类目</th>
            <th class="col-name">产品名称</th>
            <th class="col-price">价格</th>
            <th class="col-url">商城链接</th>
            <th class="col-url">视频链接</th>
            <th class="col-action">操作</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>

  <div class="footer-bar">
    <div class="tips">
      <strong>💡 操作说明：</strong><br>
      ① 点击图片位置上传产品照片（支持jpg/png，自动压缩）<br>
      ② 在表格内直接编辑链接<br>
      ③ 点「导出数据」下载文件 → 发给建哥更新上线
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn btn-warn" onclick="batchUploadTip()">📸 批量上传说明</button>
    </div>
  </div>
</div>

<!-- 编辑弹窗 -->
<div class="modal-overlay" id="editModal">
  <div class="modal-box">
    <h2>✏️ 编辑产品 <button class="close-btn" onclick="closeEditModal()">&times;</button></h2>
    <div id="editForm"></div>
    <div style="margin-top:20px;display:flex;gap:10px;justify-content:flex-end">
      <button class="btn btn-secondary" onclick="closeEditModal()">取消</button>
      <button class="btn btn-primary" onclick="saveEdit()">保存修改</button>
    </div>
  </div>
</div>

<script>
// ========== Data ==========
let allProducts = [];
const CAT_CLASS_MAP = {
  '有机粮油':'organic-grain','有机调味':'organic-sauce','面食米线':'organic-noodle',
  '蛋禽肉奶':'organic-egg','有机杂粮':'organic-grain','有机食用油':'organic-oil',
  '有机饮品':'organic-tea','滋补养生':'organic-supplement','海产品类':'organic-seafood',
  '坚果干果':'organic-nut','菌菇干货':'organic-mushroom'
};

// Load data from same directory
fetch('./data/products.json?t='+Date.now())
  .then(r => r.json())
  .then(data => {
    allProducts = data;
    renderTable();
    updateStats();
    document.getElementById('productCount').textContent = data.length;
  })
  .catch(() => {
    showToast('数据加载失败，请确保 admin.html 和 data/products.json 在同一目录', 'error');
  });

// ========== Render ==========
function getCatClass(cat) {
  return CAT_CLASS_MAP[cat] || 'organic-other';
}

function escapeHtml(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function renderTable(filter) {
  const tbody = document.getElementById('tbody');
  let list = allProducts;
  if (filter) {
    const q = filter.toLowerCase();
    list = allProducts.filter(p =>
      p.name.toLowerCase().includes(q) ||
      p.category.toLowerCase().includes(q)
    );
  }
  tbody.innerHTML = list.map((p, idx) => {
    const realIdx = allProducts.indexOf(p);
    const catCls = getCatClass(p.category);
    const hasImg = p.image && p.image.length > 5;
    const hasShop = p.shopUrl && p.shopUrl.length > 3;
    const hasVideo = p.videoUrl && p.videoUrl.length > 3;

    return `<tr data-id="${p.id}">
      <td class="col-img">
        ${hasImg ?
          `<div class="prod-img" onclick="previewImg('${escapeHtml(p.image)}')"><img src="${escapeHtml(p.image)}" alt="" loading="lazy"><span class="upload-hint">点击预览</span></div>` :
          `<label class="upload-btn" title="点击上传图片">
            <span class="spin">⏳</span><span class="plus-icon">📷</span>
            <input type="file" accept="image/*" onchange="handleUpload(${realIdx}, event)">
          </label>`
        }
      </td>
      <td><span class="cat-badge ${catCls}">${escapeHtml(p.category)}</span></td>
      <td>${escapeHtml(p.name)}</td>
      <td class="price-cell">${escapeHtml(p.price)}</td>
      <td>
        <input class="input-text url-input" placeholder="粘贴商城购买链接..." value="${escapeHtml(p.shopUrl)}"
          onchange="updateField(${realIdx}, 'shopUrl', this.value)">
      </td>
      <td>
        <input class="input-text url-input" placeholder="粘贴视频链接..." value="${escapeHtml(p.videoUrl)}"
          onchange="updateField(${realIdx}, 'videoUrl', this.value)">
      </td>
      <td class="action-cell">
        <button class="btn btn-sm btn-primary" onclick="openEdit(${realIdx})">编辑</button>
      </td>
    </tr>`;
  }).join('');
}

// ========== Update Field ==========
function updateField(idx, field, value) {
  if (idx >= 0 && idx < allProducts.length) {
    allProducts[idx][field] = value;
    showAutoSave();
  }
}

// ========== Image Upload ==========
async function handleUpload(idx, event) {
  const file = event.target.files[0];
  if (!file) return;

  // Validate
  if (!file.type.startsWith('image/')) {
    showToast('请选择图片文件（jpg/png/webp）', 'error');
    return;
  }
  if (file.size > 5 * 1024 * 1024) {
    showToast('图片不能超过5MB', 'error');
    return;
  }

  const label = event.target.closest('.upload-btn');
  if (label) label.classList.add('uploading');

  try {
    // Compress image first
    const compressedData = await compressImage(file, 800, 0.85);

    // Upload to free image host (imgbb)
    const formData = new FormData();
    formData.append('image', compressedData.split(',')[1]);

    // Use public imgbb demo key or fallback to data URL
    const response = await fetch('https://api.imgbb.com/1/upload?key=a8d7cb8d78c739adac8dbd5bd8edab07', {
      method: 'POST',
      body: formData
    });

    if (response.ok) {
      const result = await response.json();
      if (result.success && result.data?.url) {
        allProducts[idx].image = result.data.url;
        renderTable(document.getElementById('searchInput').value);
        showToast(`✅ "${allProducts[idx].name}" 图片上传成功！`, 'success');
      } else {
        throw new Error(result.error?.message || '上传失败');
      }
    } else {
      throw new Error('图床服务暂不可用，使用本地存储');
    }
  } catch (err) {
    // Fallback: store as base64 data URL
    console.log('图床上传失败，使用备用方案:', err.message);
    const reader = new FileReader();
    reader.onload = function(e) {
      allProducts[idx].image = e.target.result;
      renderTable(document.getElementById('searchInput').value);
      showToast(`✅ "${allProducts[idx].name}" 图片已保存（本地模式）`, 'success');
    };
    reader.readAsDataURL(file);
  } finally {
    if (label) label.classList.remove('uploading');
    // Reset file input
    event.target.value = '';
  }
}

// Compress image
function compressImage(file, maxWidth, quality) {
  return new Promise(resolve => {
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    const img = new Image();
    img.onload = () => {
      let w = img.width, h = img.height;
      if (w > maxWidth) { h = Math.round(h * maxWidth / w); w = maxWidth; }
      canvas.width = w; canvas.height = h;
      ctx.drawImage(img, 0, 0, w, h);
      resolve(canvas.toDataURL('image/jpeg', quality));
    };
    img.src = URL.createObjectURL(file);
  });
}

// ========== Preview Image ==========
function previewImg(url) {
  window.open(url, '_blank');
}

// ========== Edit Modal ==========
let editingIdx = -1;
function openEdit(idx) {
  editingIdx = idx;
  const p = allProducts[idx];
  const form = document.getElementById('editForm');

  form.innerHTML = `
    <div class="form-group">
      <label>产品名称</label>
      <input type="text" id="edit_name" value="${escapeHtml(p.name)}">
    </div>
    <div class="form-group">
      <label>类目</label>
      <input type="text" id="edit_category" value="${escapeHtml(p.category)}">
    </div>
    <div class="form-group">
      <label>价格</label>
      <input type="text" id="edit_price" value="${escapeHtml(p.price)}">
    </div>
    <div class="form-group">
      <label>卖点（每行一个）</label>
      <div class="highlights-list" id="hlList"></div>
      <button class="hl-add" onclick="addHighlight()">＋ 添加卖点</button>
    </div>
    <div class="form-group">
      <label>图片链接</label>
      <input type="text" id="edit_image" value="${escapeHtml(p.image)}" class="url-input">
      ${p.image ? `<img src="${escapeHtml(p.image)}" class="img-preview show" alt="预览">` : ''}
    </div>
    <div class="form-group">
      <label>商城链接</label>
      <input type="text" id="edit_shopUrl" value="${escapeHtml(p.shopUrl)}" class="url-input">
    </div>
    <div class="form-group">
      <label>视频链接</label>
      <input type="text" id="edit_videoUrl" value="${escapeHtml(p.videoUrl)}" class="url-input">
    </div>
  `;

  // Render highlights
  window._highlights = [...(p.highlights || [])];
  renderHighlights();

  document.getElementById('editModal').classList.add('active');
}

function renderHighlights() {
  const container = document.getElementById('hlList');
  if (!container) return;
  container.innerHTML = window._highlights.map((h, i) => `
    <div class="highlight-item">
      <input type="text" value="${escapeHtml(h)}" onchange="window._highlights[${i}]=this.value">
      <button class="hl-remove" onclick="removeHighlight(${i})">&times;</button>
    </div>
  `).join('');
}

function addHighlight() {
  window._highlights.push('');
  renderHighlights();
}

function removeHighlight(i) {
  window._highlights.splice(i, 1);
  renderHighlights();
}

function closeEditModal() {
  document.getElementById('editModal').classList.remove('active');
  editingIdx = -1;
}

function saveEdit() {
  if (editingIdx < 0) return;
  allProducts[editingIdx].name = document.getElementById('edit_name').value.trim() || allProducts[editingIdx].name;
  allProducts[editingIdx].category = document.getElementById('edit_category').value.trim() || allProducts[editingIdx].category;
  allProducts[editingIdx].price = document.getElementById('edit_price').value.trim() || allProducts[editingIdx].price;
  allProducts[editingIdx].image = document.getElementById('edit_image').value.trim() || allProducts[editingIdx].image;
  allProducts[editingIdx].shopUrl = document.getElementById('edit_shopUrl').value.trim();
  allProducts[editingIdx].videoUrl = document.getElementById('edit_videoUrl').value.trim();
  allProducts[editingIdx].highlights = window._highlights.filter(h => h.trim());

  renderTable(document.getElementById('searchInput').value);
  closeEditModal();
  showToast('✅ 产品信息已保存！记得点「导出数据」', 'success');
}

// ========== Search ==========
document.getElementById('searchInput').addEventListener('input', e => {
  renderTable(e.target.value);
});

// ========== Export ==========
function exportJSON() {
  // Count filled data
  let imgCount = 0, shopCount = 0, videoCount = 0;
  allProducts.forEach(p => {
    if (p.image && p.image.length > 5) imgCount++;
    if (p.shopUrl && p.shopUrl.length > 3) shopCount++;
    if (p.videoUrl && p.videoUrl.length > 3) videoCount++;
  });

  const json = JSON.stringify(allProducts, null, 2);
  const blob = new Blob([json], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `products_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);

  showToast(`📥 数据已导出！（${allProducts.length}个产品 | 🖼️${imgCount}张图 | 🔗${shopCount}个商城链接 | 🎬${videoCount}个视频）\n\n将下载的文件发给建哥即可更新线上产品库。`, 'success');
}

// ========== Stats ==========
function updateStats() {
  const cats = {};
  let imgFilled = 0, urlFilled = 0;
  allProducts.forEach(p => {
    cats[p.category] = (cats[p.category]||0) + 1;
    if (p.image && p.image.length > 5) imgFilled++;
    if (p.shopUrl && p.shopUrl.length > 3) urlFilled++;
  });

  const statsBar = document.getElementById('statsBar');
  statsBar.innerHTML = `
    <div class="stat-card"><div class="num">${allProducts.length}</div><div class="label">总产品数</div></div>
    <div class="stat-card"><div class="num">${Object.keys(cats).length}</div><div class="label">类目数量</div></div>
    <div class="stat-card"><div class="num" style="color:${imgFilled===allProducts.length?'var(--accent)':'var(--warn)'}">${imgFilled}/${allProducts.length}</div><div class="label">已上传图片</div></div>
    <div class="stat-card"><div class="num" style="color:${urlFilled===allProducts.length?'var(--accent)':'var(--warn)'}">${urlFilled}/${allProducts.length}</div><div class="label">已填商城链接</div></div>
  `;
}

function showStats() {
  const cats = {};
  allProducts.forEach(p => {
    cats[p.category] = (cats[p.category]||0) + 1;
  });
  let msg = `📊 当前统计：共 ${allProducts.length} 个产品\n\n按类目：\n`;
  Object.entries(cats).sort((a,b)=>b[1]-a[1]).forEach(([c,n]) => {
    msg += `  • ${c}：${n} 个\n`;
  });
  showToast(msg.replace(/\n/g, '<br>'), 'info');
}

function batchUploadTip() {
  showToast(
    '📸 批量上传技巧：<br>• 每次选一张图片，对应一个产品<br>' +
    '• 建议用正方形或4:3的产品照<br>' +
    '• 图片会自动压缩到800px宽，保证加载速度<br>' +
    '• 建议一次处理一类产品，效率更高',
    'info'
  );
}

// ========== Toast ==========
function showToast(msg, type='info') {
  const existing = document.querySelector('.toast');
  if (existing) existing.remove();
  const el = document.createElement('div');
  el.className = `toast toast-${type}`;
  el.innerHTML = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 4000);
}

}
</script>
